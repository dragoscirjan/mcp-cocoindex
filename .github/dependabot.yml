version: 2

updates:
  # Python dependencies (uv / pip ecosystem)
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 10
    groups:
      # Group all test/dev tooling into one PR
      dev-dependencies:
        patterns:
          - "pytest*"
          - "ruff"
          - "pdoc"
      # Group all runtime dependencies into one PR
      runtime-dependencies:
        patterns:
          - "mcp"
          - "cocoindex*"
          - "psycopg*"
          - "pgvector"
          - "sentence-transformers"
          - "numpy"
          - "pydantic"
    labels:
      - dependencies
      - python

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
